name: Publish Extension

on:
  push:
    tags:
      - "ext-v*"
  workflow_dispatch:
    inputs:
      publish_extension:
        description: "Publish VS Code Extension to Marketplace"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish-extension:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.publish_extension == true
    defaults:
      run:
        working-directory: extensions/ledgerbill-vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Verify package version is semver
        run: node -e "const p=require('./package.json'); if(!/^\\d+\\.\\d+\\.\\d+(-[0-9A-Za-z.-]+)?$/.test(p.version)){process.exit(1)}"

      - name: Validate watermark
        run: |
          if ! grep -q '_watermark' package.json || ! grep -q '_copyright' package.json; then
            echo "⚠️ Warning: package.json missing expected watermark metadata"
          fi
          echo "✅ Watermark validation passed"

      - name: Package extension (VSIX)
        run: npx vsce package --no-git-tag-version

      - name: Publish to VS Code Marketplace
        run: npx vsce publish -p $VSCE_TOKEN
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_PAT }}

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs:
      - publish-extension
    if: always()
    env:
      DISCORD_PUBLISH_WEBHOOK_URL: ${{ secrets.DISCORD_PUBLISH_WEBHOOK_URL }}
    steps:
      - name: Build notification payload
        if: env.DISCORD_PUBLISH_WEBHOOK_URL != ''
        id: payload
        shell: bash
        run: |
          EXT_RESULT="${{ needs.publish-extension.result }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REF_NAME="${{ github.ref_name }}"
          EVENT_NAME="${{ github.event_name }}"

          if [[ "$EXT_RESULT" == "success" ]]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Extension publish succeeded"
          else
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="Extension publish completed with issues"
          fi

          CONTENT="$STATUS_EMOJI **$STATUS_TEXT**\nRepository: ${{ github.repository }}\nRef: $REF_NAME\nEvent: $EVENT_NAME\nVS Code Marketplace: $EXT_RESULT\nRun: $RUN_URL"
          CONTENT_ESCAPED=$(printf '%s' "$CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          echo "json={\"content\":$CONTENT_ESCAPED}" >> "$GITHUB_OUTPUT"

      - name: Send Discord webhook
        if: env.DISCORD_PUBLISH_WEBHOOK_URL != ''
        shell: bash
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${{ steps.payload.outputs.json }}" \
            "$DISCORD_PUBLISH_WEBHOOK_URL"
