name: Publish SDKs

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish TypeScript SDK to npm"
        required: false
        default: true
        type: boolean
      publish_pypi:
        description: "Publish Python SDK to PyPI"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish-typescript:
    name: Publish TypeScript SDK (npm)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.publish_npm == true
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package version is semver
        run: node -e "const p=require('./package.json'); if(!/^\\d+\\.\\d+\\.\\d+(-[0-9A-Za-z.-]+)?$/.test(p.version)){process.exit(1)}"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    name: Publish Python SDK (PyPI)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.publish_pypi == true
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs:
      - publish-typescript
      - publish-python
    if: always()
    env:
      DISCORD_PUBLISH_WEBHOOK_URL: ${{ secrets.DISCORD_PUBLISH_WEBHOOK_URL }}
    steps:
      - name: Build notification payload
        if: env.DISCORD_PUBLISH_WEBHOOK_URL != ''
        id: payload
        shell: bash
        run: |
          TS_RESULT="${{ needs.publish-typescript.result }}"
          PY_RESULT="${{ needs.publish-python.result }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REF_NAME="${{ github.ref_name }}"
          EVENT_NAME="${{ github.event_name }}"

          if [[ "$TS_RESULT" == "success" && "$PY_RESULT" == "success" ]]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="SDK publish succeeded"
          else
            STATUS_EMOJI="⚠️"
            STATUS_TEXT="SDK publish completed with issues"
          fi

          CONTENT="$STATUS_EMOJI **$STATUS_TEXT**\nRepository: ${{ github.repository }}\nRef: $REF_NAME\nEvent: $EVENT_NAME\nTypeScript (npm): $TS_RESULT\nPython (PyPI): $PY_RESULT\nRun: $RUN_URL"
          CONTENT_ESCAPED=$(printf '%s' "$CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          echo "json={\"content\":$CONTENT_ESCAPED}" >> "$GITHUB_OUTPUT"

      - name: Send Discord webhook
        if: env.DISCORD_PUBLISH_WEBHOOK_URL != ''
        shell: bash
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "${{ steps.payload.outputs.json }}" \
            "$DISCORD_PUBLISH_WEBHOOK_URL"
